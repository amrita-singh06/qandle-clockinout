name: Qandle Attendance

on:
  schedule:
    - cron: '29 17 * * 1-5'   # Clock IN  — 9:00 AM IST, Mon–Fri
    - cron: '30 17 * * 1-5'  # Clock OUT — 7:00 PM IST, Mon–Fri

  workflow_dispatch:
    inputs:
      mode:
        description: 'in or out'
        required: true
        default: 'in'
        type: choice
        options:
          - in
          - out

jobs:
  punch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      BASE_URL: https://creospan.qandle.com
      EMP_CODE: ${{ secrets.QANDLE_EMP_CODE }}
      PASSWORD: ${{ secrets.QANDLE_PASSWORD }}

    steps:
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "29 17 * * 1-5" ]; then
            echo "mode=in" >> $GITHUB_OUTPUT
          else
            echo "mode=out" >> $GITHUB_OUTPUT
          fi

      - name: Login
        id: login
        run: |
          RESPONSE=$(curl -sS \
            -X POST "${BASE_URL}/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"emp_code\":\"${EMP_CODE}\",\"password\":\"${PASSWORD}\",\"for_clockin\":false}")

          echo "Login response: $RESPONSE"

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" != "success" ]; then
            echo "Login failed"
            exit 1
          fi

          TOKEN=$(echo "$RESPONSE" | jq -r '.data.accessToken')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "No access token"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Login successful"

      - name: Punch ${{ steps.mode.outputs.mode }}
        run: |
          RESPONSE=$(curl -sS \
            -X POST "${BASE_URL}/timeattendance/employee/clockinout" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json")

          echo "Punch response: $RESPONSE"
          echo "Punch ${{ steps.mode.outputs.mode }} done ✓"