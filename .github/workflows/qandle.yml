name: Qandle Attendance

on:
  schedule:
    # IST = UTC+5:30
    - cron: '37 22 * * 1-5'   # Clock IN  — 9:00 AM IST, Mon–Fri
    - cron: '38 22 * * 1-5'  # Clock OUT — 7:00 PM IST, Mon–Fri

  workflow_dispatch:
    inputs:
      mode:
        description: 'in or out'
        required: true
        default: 'in'
        type: choice
        options:
          - in
          - out

jobs:
  punch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 3 * * 1-5" ]; then
            echo "mode=in" >> $GITHUB_OUTPUT
          else
            echo "mode=out" >> $GITHUB_OUTPUT
          fi

      - name: Run punch script
        env:
          QANDLE_EMP_CODE: ${{ secrets.QANDLE_EMP_CODE }}
          QANDLE_PASSWORD: ${{ secrets.QANDLE_PASSWORD }}
          QANDLE_BASE_URL: https://creospan.qandle.com
          QANDLE_LOG_FILE: /dev/stdout
        run: |
          chmod +x ./qandle-punch.sh
          ./qandle-punch.sh ${{ steps.mode.outputs.mode }}