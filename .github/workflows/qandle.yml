name: Qandle Attendance

on:
  schedule:
    # All times are UTC. IST = UTC+5:30
    # 6:30 PM IST  = 1:00 PM UTC  (adjust clock-out time to your preference)
    - cron: '0 9 * * 1-5'   # Clock IN  — Mon–Fri 9:00 AM IST
    - cron: '0 21 * * 1-5'  # Clock OUT — Mon–Fri 9:00 PM IST

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      mode:
        description: 'Clock in or out?'
        required: true
        default: 'in'
        type: choice
        options:
          - in
          - out

jobs:
  attendance:
    name: Clock ${{ github.event.inputs.mode || (github.event.schedule == '30 3 * * 1-5' && 'in' || 'out') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 3 * * 1-5" ]; then
            echo "mode=in" >> $GITHUB_OUTPUT
          else
            echo "mode=out" >> $GITHUB_OUTPUT
          fi

      - name: Login to Qandle
        id: login
        run: |
          RESPONSE=$(curl -sS --connect-timeout 15 --max-time 30 \
            -w "\n%{http_code}" \
            -X POST "${{ vars.QANDLE_BASE_URL }}/auth/login" \
            -H "Content-Type: application/json" \
            -d '{
              "emp_code": "${{ secrets.QANDLE_EMP_CODE }}",
              "password": "${{ secrets.QANDLE_PASSWORD }}",
              "for_clockin": false
            }')

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "HTTP Status: $CODE"

          if [ "$CODE" != "200" ]; then
            echo "Login failed with HTTP $CODE"
            echo "$BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | jq -r '.data.accessToken // empty')

          if [ -z "$TOKEN" ]; then
            echo "No accessToken in response"
            echo "$BODY"
            exit 1
          fi

          # Mask token in logs
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Login successful"

      - name: Check current clock status
        id: status
        run: |
          RESPONSE=$(curl -sS --connect-timeout 15 --max-time 30 \
            -w "\n%{http_code}" \
            -X GET "${{ vars.QANDLE_BASE_URL }}/timeattendance/employee/clockin-time" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json")

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Status HTTP: $CODE"

          if [ "$CODE" != "200" ]; then
            echo "Status check failed — will attempt clock action anyway"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CLOCK_IN_TIME=$(echo "$BODY" | jq -r '
            .data.clock_in_time //
            .clock_in_time //
            .data.clockInTime //
            .clockInTime //
            "0"
          ')

          echo "clock_in_time=$CLOCK_IN_TIME"
          MODE="${{ steps.mode.outputs.mode }}"

          if [ "$MODE" = "in" ] && [ "$CLOCK_IN_TIME" != "0" ] && [ -n "$CLOCK_IN_TIME" ]; then
            echo "Already clocked in. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "out" ] && ([ "$CLOCK_IN_TIME" = "0" ] || [ -z "$CLOCK_IN_TIME" ]); then
            echo "Already clocked out. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Clock ${{ steps.mode.outputs.mode }}
        if: steps.status.outputs.skip != 'true'
        run: |
          RESPONSE=$(curl -sS --connect-timeout 15 --max-time 30 \
            -w "\n%{http_code}" \
            -X POST "${{ vars.QANDLE_BASE_URL }}/timeattendance/employee/clockinout" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json")

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Clock HTTP: $CODE"
          echo "Response: $BODY"

          if [ "$CODE" != "200" ]; then
            echo "Clock-${{ steps.mode.outputs.mode }} failed"
            exit 1
          fi

          echo "Clock-${{ steps.mode.outputs.mode }} successful ✓"